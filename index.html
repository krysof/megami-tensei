<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>megami-tensei</title>
  <link rel="stylesheet" href="./styles.css?v=playable1">
</head>
<body>
  <main>
    <canvas id="screen" width="640" height="400" aria-label="megami-tensei"></canvas>
    <div id="status">LOADING</div>
  </main>

  <nav id="controls" aria-label="controls">
    <section class="dpad">
      <button data-button="4">▲</button>
      <button data-button="6">◀</button>
      <button data-button="7">▶</button>
      <button data-button="5">▼</button>
    </section>
    <section class="actions">
      <button data-button="2">I</button>
      <button data-button="0">Z</button>
      <button data-button="8">X</button>
      <button data-button="3">↵</button>
    </section>
  </nav>

  <script src="./megaten.js?v=playable1"></script>
  <script src="./app.js?v=playable1"></script>
</body>
</html>
